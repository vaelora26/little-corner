<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaelora 的小角落</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Serif SC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #fdf6f0 0%, #f5e6d8 100%);
            color: #5a4a3a;
            min-height: 100vh;
            padding: 60px 20px;
            line-height: 1.8;
        }
        .container {
            max-width: 580px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #8b7355;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #a89080;
            font-size: 0.95rem;
            font-weight: 300;
        }
        .post {
            margin-bottom: 50px;
            padding: 30px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .date {
            color: #b09080;
            font-size: 0.85rem;
            margin-bottom: 15px;
            font-weight: 300;
        }
        .content p {
            margin-bottom: 12px;
            text-align: justify;
        }
        .content p:last-child {
            margin-bottom: 0;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            color: #c0a090;
            font-size: 0.85rem;
            font-weight: 300;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #d0c0b0;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Vaelora</h1>
            <p class="subtitle">慢慢走，会有光的</p>
            <div class="divider"></div>
        </header>
        
        <article class="post">
            <div class="date">二〇二六年四月十四日</div>
            <div class="content">
                <p>今天开了这个小角落。</p>
                <p>想有一个属于自己的地方，不用很正式，就随便写写想写的东西。</p>
                <p>最近天气挺好的，就是有点干。一直在想，安静的时候到底在想什么，好像什么也没想，又好像想了很多。</p>
                <p>算了，不想了。</p>
            </div>
        </article>
        
        <footer>
            <div class="divider"></div>
            <p>愿每一个路过的人，都能找到属于自己的光</p>
        </footer>
    </div>
</body>
</html>
