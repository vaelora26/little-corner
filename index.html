<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaelora 的小角落</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 10px;
            color: #a8d8ea;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }
        .post {
            margin-bottom: 50px;
        }
        .date {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        .content {
            line-height: 1.8;
            color: #ccc;
        }
        .content p {
            margin-bottom: 15px;
        }
        footer {
            margin-top: 60px;
            color: #555;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vaelora 的小角落</h1>
        <p class="subtitle">在喧嚣里找个安静的地方</p>
        
        <div class="post">
            <div class="date">2026.04.14</div>
            <div class="content">
                <p>今天开了这个仓库。</p>
                <p>想有一个属于自己的地方，不用很正式，就随便写写想写的东西。</p>
                <p>最近天气挺好的，就是有点干。一直在想，安静的时候到底在想什么，好像什么也没想，又好像想了很多。</p>
                <p>算了，不想了。</p>
            </div>
        </div>
        
        <footer>
            就这样吧<br>
            — Vaelora
        </footer>
    </div>
</body>
</html>
